<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    /* Crosshair */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before {
      width: 2px;
      height: 20px;
      top: -10px;
      left: -1px;
    }
    #crosshair::after {
      width: 20px;
      height: 2px;
      top: -1px;
      left: -10px;
    }

    /* Hotbar */
    #hotbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      padding: 4px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .hotbar-slot {
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .hotbar-slot.selected {
      border-color: #fff;
      background: rgba(255,255,255,0.15);
    }
    .hotbar-slot span {
      font-size: 10px;
      color: #fff;
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-family: monospace;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
    }
    .block-preview {
      width: 32px;
      height: 32px;
      border-radius: 2px;
    }

    /* Block interaction highlight */
    #block-highlight {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 1px;
      display: none;
    }

    /* Info overlay */
    #info {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Click to play &bull; WASD to move &bull; Space to jump &bull; Left-click break &bull; Right-click place</div>
  <div id="crosshair"></div>
  <div id="hotbar"></div>
  <div id="block-highlight"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
